name: Tests

on:
  pull_request:
    paths:
      - "_config/*.py"
      - "_config/requirements.txt"
      - ".github/workflows/tests.yml"
  push:
    branches-ignore:
      - "main"
    paths:
      - "_config/*.py"
      - "_config/requirements.txt"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install python packages
        working-directory: _config
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: _config
        run: |
          python -m pytest -q
